# ──────── 推理加速 ──────────────────────────────────────────────────────────────
acceleration:
  # 使用 FP16 半精度推理
  use_fp16: true

  # CFM 扩散阶段使用 BF16 混合精度
  # 开启耗时：CFM=30.49s + BigVGAN=1.11s
  # 关闭耗时：CFM=58.19s + BigVGAN=1.11s
  cfm_amp: true

  # 使用自定义 CUDA kernel（加速 BigVGAN 解码）
  use_cuda_kernel: false

  # 使用 torch.compile 编译优化（加速 CFM 扩散）
  use_torch_compile: false

  # 使用 DeepSpeed 推理加速
  use_deepspeed: false

# ──────── GPT 解码参数  ─────────────────────────────────────────────────────────
generation:
  # 是否激活采样机制
  do_sample: true

  # 采样温度，控制生成音频的多样性与情感波动
  # 仅在 do_sample 为 true 时生效
  # - 值越低，发音越保守、稳定
  temperature: 0.8

  # 核采样阈值，取值范围为 (0.0, 1.0]
  # 仅在 do_sample 为 true 时生效
  # 每次生成时，仅从累积概率达到 top_p 的候选 Token 集合中进行选择
  # 较小的值（如 0.8）可以有效滤除概率极低的发音方案，防止出现奇怪的怪音
  top_p: 0.8

  # 保留的最大候选 Token 数量，取值范围为 [1, 词表大小]
  # 仅在 do_sample 为 true 时生效
  # 每次生成时，强行只在概率最高的前 top_k 个 Token 中进行选择
  top_k: 30

  # 束搜索（Beam Search）的候选路径数量
  # - 值 > 1: 启用束搜索。数值越大，模型选择全局发音最优路径的能力越强，声音的语调连贯性更好，但会增加显存占用和计算耗时
  num_beams: 3

  # 长度惩罚系数
  # 仅在启用束搜索（num_beams > 1）时有效
  # - 大于 0.0: 促使模型生成更长的音频
  # - 小于 0.0: 促使模型生成更短的音频
  length_penalty: 0.0

  # 重复惩罚系数，取值 >= 1.0。
  # 惩罚模型重复产生相同的离散代码，用于抑制模型发音卡死、无限循环
  repetition_penalty: 10.0

  # 典型采样（Typical Sampling）
  # 启用后会在 top-k/top-p 基础上额外过滤掉"过于典型"的低信息量 Token
  # typical_mass 控制保留的累积概率质量
  typical_sampling: true
  typical_mass: 0.9

  # 允许GPT生成的TOKEN长度上限
  # 截断上限，防止 GPT 陷入死循环无法自己停止
  max_mel_tokens: 1500

# ──────── CFM 频谱扩散与 VAD 裁剪 ─────────────────────────────────────────────────────
audio:
  # CFM 扩散步数，越大质量越高但越慢
  diffusion_steps: 25

  # 无分类器引导率（Classifier-Free Guidance rate）
  inference_cfg_rate: 0.7

  # 扩散初始噪声温度
  temperature: 1.0

  # VAD 尾部静音裁剪
  # 静音帧数 <= 此值不裁剪（20 帧 = 232ms）
  safety_tail_frames: 20

  # 静音帧数 >= 此值时裁剪（86 帧 = 1.0s）
  abs_trigger_frames: 86

  # 静音帧数 >= 此值 且 静音占比 >= trigger_ratio 时触发裁剪
  co_trigger_frames: 35
  co_trigger_ratio: 0.15

  # 静音帧能量阈值（mel 幅值平方，低于此值为静音）
  silence_energy_threshold: 130.0

# ──────── 音频装箱与分桶 ───────────────────────────────────────────────────────────────────
batching:
  # 单批次最大 token 额度，控制 batch 装箱大小，优先级低于调用时直接传参
  max_tokens_per_batch: 1500

  # 单条文本按标点分段的最大 token 数，超出后切分，优先级低于调用时直接传参
  max_text_tokens_per_segment: 240

# ──────── 发音处理（多音字消歧等）─────────────────────────────────────────────────────────
pronunciation:
  # 是否启用发音处理
  enable: true

  # g2pW 模型路径（相对 indextts_batch/）
  g2pw_model_dir: models/G2PWModel

  # BERT 词元化模型路径（相对 indextts_batch/）
  bert_model_dir: models/bert-base-chinese

  # 多音字词典路径（相对 indextts_batch/）
  polyphone_json_path: data/polyphone.json

  # g2pW ONNX 推理批大小
  batch_size: 512

# ──────── s2mel 声学模型参数 ─────────────────────────────────────────────────────────────────
s2mel:
  preprocess_params:
    sr: 22050
    hop_length: 256
  # 代码长度到梅尔帧数的缩放系数
  mel_scale: 1.72

# ──────── 参考音频编码 ─────────────────────────────────────────────────────────────────────────
reference_encoder:
  # 参考音频最长截断秒数（超过此值的参考音频将被截断）
  max_audio_length_seconds: 15.0
